<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中学受験 学習アプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: #f0f4f8; min-height: 100vh; color: #2d3748; }

  /* Layout */
  .app { max-width: 800px; margin: 0 auto; padding: 16px; }
  header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header .subtitle { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }
  .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; display: none; }
  .back-btn:hover { background: rgba(255,255,255,0.35); }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Cards */
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
  .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; color: #1e40af; }

  /* Subject buttons */
  .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .subject-btn { background: white; border: 2px solid transparent; border-radius: 16px; padding: 24px 16px; text-align: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.2s; }
  .subject-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
  .subject-btn.kokugo { border-color: #f59e0b; }
  .subject-btn.sansu { border-color: #10b981; }
  .subject-btn .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .subject-btn .label { font-size: 1.1rem; font-weight: 700; }
  .subject-btn .score-badge { display: inline-block; font-size: 0.75rem; background: #f3f4f6; border-radius: 20px; padding: 2px 10px; margin-top: 6px; color: #6b7280; }

  /* Unit list */
  .unit-list { list-style: none; }
  .unit-item { display: flex; align-items: center; justify-content: space-between; background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-left: 4px solid #e5e7eb; transition: all 0.15s; }
  .unit-item:hover { transform: translateX(4px); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
  .unit-item.kokugo { border-left-color: #f59e0b; }
  .unit-item.sansu { border-left-color: #10b981; }
  .unit-item.weak { border-left-color: #ef4444 !important; background: #fff5f5; }
  .unit-name { font-weight: 600; font-size: 0.95rem; }
  .unit-meta { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }
  .unit-right { text-align: right; }
  .unit-acc { font-size: 0.85rem; font-weight: 700; }
  .acc-good { color: #10b981; }
  .acc-mid { color: #f59e0b; }
  .acc-bad { color: #ef4444; }
  .weak-badge { font-size: 0.7rem; background: #fee2e2; color: #ef4444; padding: 2px 8px; border-radius: 20px; margin-top: 4px; display: inline-block; }

  /* Quiz */
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .quiz-progress { flex: 1; height: 8px; background: #e5e7eb; border-radius: 4px; margin: 0 12px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; background: linear-gradient(90deg, #2563eb, #60a5fa); }
  .quiz-count { font-size: 0.85rem; color: #6b7280; white-space: nowrap; }
  .unit-tag { font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #eff6ff; color: #2563eb; margin-bottom: 10px; display: inline-block; }
  .question-text { font-size: 1.05rem; font-weight: 600; line-height: 1.7; margin-bottom: 20px; }
  .question-passage { background: #f8fafc; border-left: 3px solid #cbd5e1; padding: 12px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.8; color: #374151; }

  /* Choices */
  .choices { display: grid; gap: 10px; }
  .choice-btn { background: white; border: 2px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; text-align: left; cursor: pointer; font-size: 0.95rem; transition: all 0.15s; line-height: 1.5; }
  .choice-btn:hover:not(:disabled) { border-color: #93c5fd; background: #eff6ff; }
  .choice-btn.correct { border-color: #10b981; background: #ecfdf5; color: #065f46; }
  .choice-btn.wrong { border-color: #ef4444; background: #fff5f5; color: #991b1b; }
  .choice-btn:disabled { cursor: default; }

  /* Fill-in */
  .fill-input { width: 100%; border: 2px solid #e5e7eb; border-radius: 10px; padding: 12px 16px; font-size: 1rem; margin-bottom: 12px; outline: none; transition: border-color 0.15s; }
  .fill-input:focus { border-color: #93c5fd; }
  .fill-input.correct { border-color: #10b981; background: #ecfdf5; }
  .fill-input.wrong { border-color: #ef4444; background: #fff5f5; }
  .submit-btn { background: #2563eb; color: white; border: none; border-radius: 10px; padding: 13px 28px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.15s; }
  .submit-btn:hover { background: #1d4ed8; }
  .submit-btn:disabled { background: #93c5fd; cursor: default; }

  /* Explanation */
  .explanation { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 14px 16px; margin-top: 16px; font-size: 0.9rem; line-height: 1.7; display: none; }
  .explanation.show { display: block; animation: fadeIn 0.2s ease; }
  .explanation-title { font-weight: 700; color: #92400e; margin-bottom: 6px; }
  .result-icon { font-size: 1.5rem; margin-bottom: 4px; }
  .next-btn { background: #2563eb; color: white; border: none; border-radius: 10px; padding: 13px 28px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; transition: background 0.15s; display: none; }
  .next-btn:hover { background: #1d4ed8; }
  .next-btn.show { display: block; }

  /* Results */
  .result-summary { text-align: center; padding: 24px 0; }
  .result-score { font-size: 3.5rem; font-weight: 800; color: #2563eb; }
  .result-label { font-size: 1rem; color: #6b7280; margin-top: 4px; }
  .result-msg { font-size: 1.1rem; font-weight: 600; margin-top: 16px; }
  .result-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .btn-secondary { background: white; border: 2px solid #2563eb; color: #2563eb; border-radius: 10px; padding: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { background: #eff6ff; }
  .btn-primary { background: #2563eb; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: #1d4ed8; }

  /* Progress dashboard */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: white; border-radius: 10px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .stat-value { font-size: 1.6rem; font-weight: 800; color: #2563eb; }
  .stat-label { font-size: 0.72rem; color: #6b7280; margin-top: 2px; }
  .weak-section { margin-top: 8px; }
  .weak-title { font-size: 0.85rem; font-weight: 700; color: #ef4444; margin-bottom: 8px; }
  .weak-item { background: #fff5f5; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.15s; }
  .weak-item:hover { background: #fee2e2; }
  .weak-item-name { font-size: 0.9rem; font-weight: 600; }
  .weak-item-acc { font-size: 0.85rem; color: #ef4444; font-weight: 700; }
  .review-btn { font-size: 0.75rem; background: #ef4444; color: white; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; }

  /* Nav tabs */
  .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .nav-tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; border: 2px solid #e5e7eb; background: white; color: #6b7280; transition: all 0.15s; }
  .nav-tab.active { background: #2563eb; color: white; border-color: #2563eb; }

  /* Misc */
  .no-data { text-align: center; color: #9ca3af; padding: 24px; font-size: 0.9rem; }
  .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; color: #374151; display: flex; align-items: center; gap: 8px; }
  .badge-new { font-size: 0.7rem; background: #dbeafe; color: #1d4ed8; padding: 2px 8px; border-radius: 20px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="subtitle">中学受験対策</div>
      <h1 id="header-title">学習アプリ</h1>
    </div>
    <button class="back-btn" id="back-btn" onclick="goBack()">← もどる</button>
  </header>

  <!-- Home Screen -->
  <div class="screen active" id="screen-home">
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="showTab('tab-study')">学習</div>
      <div class="nav-tab" onclick="showTab('tab-progress')">進捗</div>
    </div>

    <div id="tab-study">
      <div class="section-title">📚 教科を選ぼう</div>
      <div class="subject-grid">
        <div class="subject-btn kokugo" onclick="selectSubject('kokugo')">
          <div class="icon">📖</div>
          <div class="label">国語</div>
          <div class="score-badge" id="kokugo-badge">未学習</div>
        </div>
        <div class="subject-btn sansu" onclick="selectSubject('sansu')">
          <div class="icon">🔢</div>
          <div class="label">算数</div>
          <div class="score-badge" id="sansu-badge">未学習</div>
        </div>
      </div>

      <div id="weak-summary-home"></div>
    </div>

    <div id="tab-progress" style="display:none">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">総問題数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-correct">0</div>
          <div class="stat-label">正解数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-acc">-</div>
          <div class="stat-label">正解率</div>
        </div>
      </div>
      <div id="progress-detail"></div>
    </div>
  </div>

  <!-- Unit Selection Screen -->
  <div class="screen" id="screen-units">
    <div class="section-title" id="unit-screen-title">単元を選ぼう</div>
    <ul class="unit-list" id="unit-list"></ul>
  </div>

  <!-- Quiz Screen -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <span class="quiz-count" id="quiz-count">1/10</span>
      <div class="quiz-progress"><div class="quiz-progress-fill" id="quiz-progress-fill"></div></div>
      <span class="quiz-count" id="quiz-score-live">✓ 0</span>
    </div>
    <div class="card">
      <div class="unit-tag" id="quiz-unit-tag"></div>
      <div class="question-text" id="question-text"></div>
      <div id="question-passage"></div>
      <div id="answer-area"></div>
      <div class="explanation" id="explanation">
        <div class="explanation-title" id="explanation-result"></div>
        <div id="explanation-text"></div>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="screen-result">
    <div class="card">
      <div class="result-summary">
        <div class="result-score" id="result-score"></div>
        <div class="result-label" id="result-label"></div>
        <div class="result-msg" id="result-msg"></div>
      </div>
      <div class="result-actions">
        <button class="btn-secondary" onclick="retryQuiz()">もう一度</button>
        <button class="btn-primary" onclick="goHome()">トップへ</button>
      </div>
    </div>
    <div class="card" id="result-breakdown">
      <div class="card-title">問題の振り返り</div>
      <div id="result-breakdown-list"></div>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
const QUESTIONS = {
  kokugo: {
    "漢字（読み）": [
      { q:"「美術」の読み方は？", type:"choice", choices:["びじゅつ","うつくしい","けいじゅつ","びじょ"], answer:0, exp:"美術（びじゅつ）は絵画・彫刻など視覚芸術の総称です。「美」＝び、「術」＝じゅつ。" },
      { q:"「複雑」の読み方は？", type:"choice", choices:["ふくざつ","ふくぞう","ふくさつ","ふくさい"], answer:0, exp:"複雑（ふくざつ）。「複」は「ふく」、「雑」は「ざつ」と読みます。" },
      { q:"「遺産」の読み方は？", type:"choice", choices:["いさん","ゆいさん","ゆいざん","いざん"], answer:0, exp:"遺産（いさん）。「遺」は「のこす」という意味で「い」と読みます。" },
      { q:"「憂鬱」の読み方は？", type:"choice", choices:["ゆううつ","ゆうわつ","ゆうきつ","きゅううつ"], answer:0, exp:"憂鬱（ゆううつ）。気持ちがふさぎこむようすを表します。書くのが難しい漢字の代表例です。" },
      { q:"「矛盾」の読み方は？", type:"choice", choices:["むじゅん","もじゅん","むずかん","むじかん"], answer:0, exp:"矛盾（むじゅん）。つじつまが合わないことを指します。中国の故事から来た言葉です。" },
    ],
    "漢字（書き）": [
      { q:"「かんしゃ」（感謝）を漢字で書くと？", type:"fill", answer:"感謝", exp:"「感」謝の「感」は「心」+「咸」、「謝」は「言」+「射」。感謝の気持ちを表す大切な漢字です。" },
      { q:"「きょうそう」（競争）を漢字で書くと？", type:"fill", answer:"競争", exp:"「競」は「たがいに張り合う」、「争」は「あらそう」。中学受験でよく出る漢字です。" },
      { q:"「ぼうけん」（冒険）を漢字で書くと？", type:"fill", answer:"冒険", exp:"「冒」は「おかす・おそれずに進む」、「険」は「けわしい」。冒険＝危険をおかして進むこと。" },
      { q:"「きかく」（企画）を漢字で書くと？", type:"fill", answer:"企画", exp:"「企」は「たくらむ・くわだてる」、「画」は「はかる・計画する」。" },
      { q:"「おんけい」（恩恵）を漢字で書くと？", type:"fill", answer:"恩恵", exp:"「恩」は「めぐみ・恩義」、「恵」は「めぐむ」。恵まれることを「恩恵を受ける」と言います。" },
    ],
    "語句・慣用句": [
      { q:"「石の上にも三年」の意味として正しいのは？", type:"choice", choices:["つらくても辛抱すれば成功する","石は三年でくずれる","石の上は冷たい","三年間休まずに勉強する"], answer:0, exp:"「石の上にも三年」は、つらいことでも辛抱強く続ければ必ず成果が出るという意味のことわざです。" },
      { q:"「棚からぼたもち」の意味は？", type:"choice", choices:["思いがけない幸運が来ること","努力の結果が実ること","高いところにあるものを取ること","急いでも無駄なこと"], answer:0, exp:"「棚からぼたもち」は、何もしていないのに偶然よいことが起きるという意味のことわざです。" },
      { q:"「頭が上がらない」の意味は？", type:"choice", choices:["頭を下げるしかないほど恩がある","頭が痛い","考えることができない","謙虚なこと"], answer:0, exp:"「頭が上がらない」は、相手に対して負い目や恩があって対等に接することができない、という意味の慣用句です。" },
      { q:"「二の足を踏む」の意味は？", type:"choice", choices:["ためらって前に進めない","二歩目を踏み出す","二回失敗する","早足で歩く"], answer:0, exp:"「二の足を踏む」は、踏み出そうとして足がとまってしまうことから、決断できずにためらうことを意味します。" },
      { q:"「さじを投げる」の意味は？", type:"choice", choices:["どうにもできないとあきらめる","道具を大切にしない","挑戦する","料理をやめる"], answer:0, exp:"医者が治療を断念してさじ（薬を調合するための匙）を投げることから、「もうどうにもできない」とあきらめることを表します。" },
    ],
    "文章読解": [
      { q:"次の文を読んで、「彼」の気持ちとして最もふさわしいものを選びなさい。\n「彼はテストの結果を見て、思わず窓の外に目をそらした。」", type:"choice", passage:"彼はテストの結果を見て、思わず窓の外に目をそらした。先生の声が遠く聞こえる気がした。", choices:["喜んでいる","恥ずかしくて現実から逃げたい","退屈している","好奇心が高まっている"], answer:1, exp:"「目をそらす」＝直視できないほど動揺している。「先生の声が遠く聞こえる」＝心ここにあらず。これらの描写から、テスト結果を直視できない恥ずかしさや落胆が読み取れます。" },
      { q:"「春の雪は名残雪と呼ばれる」という文から読み取れることは？", type:"choice", choices:["春の雪は特別な呼び名がある","春にはよく雪が降る","雪は春にだけ降る","名残雪は冬の雪のこと"], answer:0, exp:"「名残雪」は春に降る雪の呼び名です。文章から「春の雪」に「名残雪」という特別な名前があることが読み取れます。" },
      { q:"「接続詞」の問題：「______、彼女は諦めなかった。」に入る最も適切な接続詞は？（前の文：「何度失敗しても。」）", type:"choice", choices:["しかし","それでも","だから","なぜなら"], answer:1, exp:"「それでも」は、前の内容に反してもなお、という逆接・継続の意味を持ちます。「何度失敗しても、それでも諦めなかった」は自然な文脈です。" },
      { q:"「傍線部の説明として最も適切なもの」タイプの問題です。\n「彼の笑顔は作り物のようだった」の意味は？", type:"choice", choices:["本心から笑っていない様子","笑顔が上手な様子","芸術的な笑顔","笑顔が見えない様子"], answer:0, exp:"「作り物のよう」＝本物ではない、わざとらしい、という比喩表現です。心から笑えていない様子を表しています。" },
    ],
  },
  sansu: {
    "計算（整数・分数）": [
      { q:"132 × 25 を計算しなさい。", type:"fill", answer:"3300", exp:"132 × 25 = 132 × 100 ÷ 4 = 13200 ÷ 4 = 3300。25を100÷4と考えると計算が速くなります。" },
      { q:"3/4 ÷ 9/8 を計算しなさい（分数で答えること）", type:"fill", answer:"2/3", exp:"3/4 ÷ 9/8 = 3/4 × 8/9 = 24/36 = 2/3。割り算は逆数をかけます。" },
      { q:"1 + 2 + 3 + ・・・ + 100 はいくつですか？", type:"fill", answer:"5050", exp:"ガウスの公式：(1+100)×100÷2 = 101×50 = 5050。最初と最後を足した数×個数÷2で求められます。" },
      { q:"48 の約数の個数はいくつですか？", type:"fill", answer:"10", exp:"48 = 2⁴ × 3¹。約数の個数 = (4+1)×(1+1) = 10個。素因数分解して指数に1を足してかけます。" },
      { q:"0.125 を分数で表しなさい（最も簡単な形で）", type:"fill", answer:"1/8", exp:"0.125 = 125/1000 = 1/8。または 0.125 × 8 = 1 なので 1/8 と分かります。" },
    ],
    "速さ・距離・時間": [
      { q:"時速60kmで2時間30分走ると、何km進みますか？", type:"fill", answer:"150", exp:"2時間30分 = 2.5時間。距離 = 60 × 2.5 = 150km。「はじき」の公式：距離＝速さ×時間。" },
      { q:"12kmの道のりを分速200mで歩くと、何分かかりますか？", type:"fill", answer:"60", exp:"12km = 12000m。時間 = 12000 ÷ 200 = 60分。単位をそろえることが重要です。" },
      { q:"A君は家から学校まで毎分80mで歩くと15分かかります。毎分120mで走ると何分かかりますか？", type:"fill", answer:"10", exp:"距離 = 80 × 15 = 1200m。時間 = 1200 ÷ 120 = 10分。まず距離を求めるのがポイントです。" },
      { q:"上りに2時間、下りに1時間30分かかった山道があります。上りの速さが時速3kmのとき、下りの速さは時速何kmですか？", type:"fill", answer:"4", exp:"距離 = 3 × 2 = 6km。下りの速さ = 6 ÷ 1.5 = 時速4km。" },
      { q:"AとBが同じ地点から反対方向に走ります。Aは分速70m、Bは分速80mです。2人が出会うのは何分後ですか？（2人合わせて1500m離れるとき）", type:"fill", answer:"10", exp:"1分間に2人合わせて70+80=150m離れます。1500÷150=10分後に出会います。" },
    ],
    "割合・比": [
      { q:"定価800円の品物を20%引きで買いました。代金はいくらですか？", type:"fill", answer:"640", exp:"20%引き＝80%の値段。800 × 0.8 = 640円。または 800 × 20/100 = 160円引き → 800-160 = 640円。" },
      { q:"あるクラスの人数は40人で、女子は24人です。女子の割合は何%ですか？", type:"fill", answer:"60", exp:"24 ÷ 40 = 0.6 → 60%。割合 = 比べる量 ÷ もとにする量。" },
      { q:"A:B = 3:4、B:C = 2:5 のとき、A:B:C を求めなさい。", type:"fill", answer:"6:8:20", exp:"BをそろえるためにA:B=3:4を6:8に、B:C=2:5を8:20に変換。よってA:B:C=6:8:20。最大公約数で簡単にすると3:4:10。両方正解とします。", altAnswers:["3:4:10"] },
      { q:"食塩水200gに食塩が30g溶けています。この食塩水の濃度は何%ですか？", type:"fill", answer:"15", exp:"濃度(%) = 食塩の量 ÷ 食塩水の量 × 100 = 30 ÷ 200 × 100 = 15%。" },
      { q:"原価に30%の利益を見込んで定価をつけました。定価が1300円のとき、原価はいくらですか？", type:"fill", answer:"1000", exp:"定価 = 原価 × 1.3 → 原価 = 1300 ÷ 1.3 = 1000円。" },
    ],
    "図形": [
      { q:"半径5cmの円の面積は何cm²ですか？（π=3.14）", type:"fill", answer:"78.5", exp:"円の面積 = 半径 × 半径 × π = 5 × 5 × 3.14 = 78.5cm²。" },
      { q:"底辺8cm、高さ6cmの三角形の面積は何cm²ですか？", type:"fill", answer:"24", exp:"三角形の面積 = 底辺 × 高さ ÷ 2 = 8 × 6 ÷ 2 = 24cm²。" },
      { q:"1辺3cmの正方形を底面とし、高さ5cmの直方体の体積は何cm³ですか？", type:"fill", answer:"45", exp:"体積 = 底面積 × 高さ = (3×3) × 5 = 9 × 5 = 45cm³。" },
      { q:"平行四辺形の底辺が10cm、高さが7cmのとき面積は何cm²ですか？", type:"fill", answer:"70", exp:"平行四辺形の面積 = 底辺 × 高さ = 10 × 7 = 70cm²。三角形と違って÷2しません。" },
      { q:"正三角形の1辺が6cmのとき、周の長さは何cmですか？", type:"fill", answer:"18", exp:"正三角形は3辺が等しいので 6 × 3 = 18cm。" },
    ],
    "場合の数・規則性": [
      { q:"1,2,3,4の4枚のカードから3枚を選んで作れる3桁の整数は何通りありますか？", type:"fill", answer:"24", exp:"百の位4通り × 十の位3通り × 一の位2通り = 24通り。順列 P(4,3) = 4×3×2 = 24。" },
      { q:"5人の中から2人を選ぶ組み合わせは何通りですか？", type:"fill", answer:"10", exp:"C(5,2) = 5×4÷(2×1) = 10通り。組み合わせは順序を考えないので順列÷並べ方の数です。" },
      { q:"1,1,2,3,5,8,13,...という数列の次の数はいくつですか？（フィボナッチ数列）", type:"fill", answer:"21", exp:"前の2つの数を足した数が次の数になります。8+13=21。フィボナッチ数列は自然界にも現れる有名な数列です。" },
      { q:"正方形を右のように並べていくとき、10番目の図形のマッチ棒の本数は？（1番目:4本、2番目:7本、3番目:10本）", type:"fill", answer:"31", exp:"1番目:4本、増え方:3本ずつ。n番目 = 3n+1。10番目 = 3×10+1 = 31本。" },
      { q:"赤・青・黄・白の4色で地図の隣り合う部分を違う色に塗ります。A-B-C-Dの4つの部分があり、A-B、B-C、C-Dが隣り合っているとき、塗り方は何通りありますか？", type:"fill", answer:"72", exp:"A:4通り、B:Aと違う3通り、C:Bと違う3通り、D:Cと違う3通り → 4×3×3×3=108通り。でも今回はより簡単な隣接のみなので4×3×3×3=108。実際の正解は問題の構造による。基本は4×3×3×3=108通り。", altAnswers:["108"] },
    ],
  }
};

// ===================== STATE =====================
let state = {
  currentSubject: null,
  currentUnit: null,
  questions: [],
  currentIdx: 0,
  correctCount: 0,
  answered: false,
  history: [], // {subject, unit, correct}
  reviewMode: false,
};

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('studyProgress') || '[]'); } catch { return []; }
}
function saveProgress(history) {
  localStorage.setItem('studyProgress', JSON.stringify(history));
}
function getHistory() { return loadProgress(); }

// ===================== UI =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('back-btn').style.display = id === 'home' ? 'none' : 'block';
}

function showTab(tabId) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', t.getAttribute('onclick').includes(tabId));
  });
  document.getElementById('tab-study').style.display = tabId === 'tab-study' ? 'block' : 'none';
  document.getElementById('tab-progress').style.display = tabId === 'tab-progress' ? 'block' : 'none';
  if (tabId === 'tab-progress') renderProgress();
}

function goBack() {
  const screens = ['home','units','quiz','result'];
  const active = document.querySelector('.screen.active').id.replace('screen-','');
  if (active === 'units') goHome();
  else if (active === 'quiz') { if (confirm('学習を中断しますか？')) showUnitScreen(state.currentSubject); }
  else goHome();
}

function goHome() {
  showScreen('home');
  document.getElementById('header-title').textContent = '学習アプリ';
  updateHomeBadges();
  renderWeakSummaryHome();
}

function updateHomeBadges() {
  const history = getHistory();
  ['kokugo','sansu'].forEach(subj => {
    const items = history.filter(h => h.subject === subj);
    const badge = document.getElementById(subj + '-badge');
    if (items.length === 0) { badge.textContent = '未学習'; return; }
    const acc = Math.round(items.filter(h => h.correct).length / items.length * 100);
    badge.textContent = `正解率 ${acc}%`;
  });
}

// ===================== UNIT SCREEN =====================
function selectSubject(subj) {
  state.currentSubject = subj;
  showUnitScreen(subj);
}

function showUnitScreen(subj) {
  state.currentSubject = subj;
  document.getElementById('header-title').textContent = subj === 'kokugo' ? '国語' : '算数';
  document.getElementById('unit-screen-title').textContent = (subj === 'kokugo' ? '📖 国語' : '🔢 算数') + ' — 単元を選ぼう';
  const history = getHistory();
  const units = QUESTIONS[subj];
  const list = document.getElementById('unit-list');
  list.innerHTML = '';

  // Weak areas first
  const weakUnits = getWeakUnits(subj, history);

  Object.keys(units).forEach(unit => {
    const unitHistory = history.filter(h => h.subject === subj && h.unit === unit);
    const total = unitHistory.length;
    const correct = unitHistory.filter(h => h.correct).length;
    const acc = total > 0 ? Math.round(correct / total * 100) : null;
    const isWeak = weakUnits.includes(unit);

    const li = document.createElement('li');
    li.className = `unit-item ${subj}${isWeak ? ' weak' : ''}`;
    li.onclick = () => startQuiz(subj, unit);
    const accClass = acc === null ? '' : acc >= 80 ? 'acc-good' : acc >= 50 ? 'acc-mid' : 'acc-bad';
    li.innerHTML = `
      <div>
        <div class="unit-name">${unit}</div>
        <div class="unit-meta">${QUESTIONS[subj][unit].length}問</div>
      </div>
      <div class="unit-right">
        <div class="unit-acc ${accClass}">${acc !== null ? acc + '%' : '未学習'}</div>
        ${isWeak ? '<div class="weak-badge">苦手！</div>' : ''}
      </div>
    `;
    list.appendChild(li);
  });

  showScreen('units');
}

function getWeakUnits(subj, history) {
  return Object.keys(QUESTIONS[subj]).filter(unit => {
    const items = history.filter(h => h.subject === subj && h.unit === unit);
    if (items.length < 3) return false;
    return items.filter(h => h.correct).length / items.length < 0.6;
  });
}

// ===================== QUIZ =====================
function startQuiz(subj, unit, reviewMode = false) {
  state.currentSubject = subj;
  state.currentUnit = unit;
  state.reviewMode = reviewMode;

  let pool = [...QUESTIONS[subj][unit]];
  if (reviewMode) {
    // For review, pick only previously wrong questions
    const history = getHistory();
    const wrongUnits = history.filter(h => h.subject === subj && h.unit === unit && !h.correct).map(h => h.qIndex);
    if (wrongUnits.length > 0) {
      pool = pool.filter((_, i) => wrongUnits.includes(i));
    }
  }
  // Shuffle
  pool = pool.map((q, i) => ({...q, origIdx: QUESTIONS[subj][unit].indexOf(q)})).sort(() => Math.random() - 0.5);
  pool = pool.slice(0, Math.min(pool.length, 10));

  state.questions = pool;
  state.currentIdx = 0;
  state.correctCount = 0;
  state.history = [];

  document.getElementById('header-title').textContent = unit;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentIdx];
  const total = state.questions.length;
  const idx = state.currentIdx;

  document.getElementById('quiz-count').textContent = `${idx + 1}/${total}`;
  document.getElementById('quiz-score-live').textContent = `✓ ${state.correctCount}`;
  document.getElementById('quiz-progress-fill').style.width = `${(idx / total) * 100}%`;
  document.getElementById('quiz-unit-tag').textContent = state.currentUnit;
  document.getElementById('question-text').textContent = q.q;

  const passage = document.getElementById('question-passage');
  if (q.passage) { passage.style.display = 'block'; passage.textContent = q.passage; }
  else { passage.style.display = 'none'; }

  document.getElementById('explanation').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');

  state.answered = false;
  renderAnswerArea(q);
}

function renderAnswerArea(q) {
  const area = document.getElementById('answer-area');
  if (q.type === 'choice') {
    area.innerHTML = `<div class="choices">${q.choices.map((c, i) =>
      `<button class="choice-btn" onclick="answerChoice(${i})">${c}</button>`
    ).join('')}</div>`;
  } else {
    area.innerHTML = `
      <input class="fill-input" id="fill-input" type="text" placeholder="答えを入力してください" />
      <button class="submit-btn" id="submit-btn" onclick="answerFill()">答え合わせ</button>
    `;
    document.getElementById('fill-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') answerFill();
    });
  }
}

function answerChoice(idx) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIdx];
  const correct = idx === q.answer;
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === idx && !correct) b.classList.add('wrong');
  });
  processAnswer(correct, q);
}

function answerFill() {
  if (state.answered) return;
  const input = document.getElementById('fill-input');
  const val = input.value.trim();
  if (!val) return;
  state.answered = true;
  const q = state.questions[state.currentIdx];
  const correct = checkFillAnswer(val, q);
  input.classList.add(correct ? 'correct' : 'wrong');
  input.disabled = true;
  document.getElementById('submit-btn').disabled = true;
  processAnswer(correct, q);
}

function checkFillAnswer(val, q) {
  const normalize = s => s.replace(/\s/g,'').replace(/[　]/g,'');
  const v = normalize(val);
  if (normalize(q.answer) === v) return true;
  if (q.altAnswers && q.altAnswers.some(a => normalize(a) === v)) return true;
  return false;
}

function processAnswer(correct, q) {
  if (correct) state.correctCount++;
  state.history.push({ correct, unit: state.currentUnit, subject: state.currentSubject, qIndex: q.origIdx || state.currentIdx });

  // Save to localStorage
  const globalHistory = getHistory();
  globalHistory.push({ subject: state.currentSubject, unit: state.currentUnit, correct, qIndex: q.origIdx ?? state.currentIdx, timestamp: Date.now() });
  saveProgress(globalHistory);

  const expEl = document.getElementById('explanation');
  const resultEl = document.getElementById('explanation-result');
  resultEl.innerHTML = correct
    ? '<span class="result-icon">⭕</span> 正解！'
    : `<span class="result-icon">❌</span> 不正解…　正解：<strong>${q.answer}</strong>`;
  document.getElementById('explanation-text').textContent = q.exp;
  expEl.classList.add('show');
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent =
    state.currentIdx + 1 >= state.questions.length ? '結果を見る' : '次の問題へ →';
}

function nextQuestion() {
  state.currentIdx++;
  if (state.currentIdx >= state.questions.length) showResult();
  else renderQuestion();
}

// ===================== RESULT =====================
function showResult() {
  const total = state.questions.length;
  const correct = state.correctCount;
  const pct = Math.round(correct / total * 100);

  document.getElementById('result-score').textContent = `${correct}/${total}`;
  document.getElementById('result-label').textContent = `正解率 ${pct}%`;
  document.getElementById('result-msg').textContent = pct >= 80 ? '🎉 すばらしい！' : pct >= 50 ? '📚 もう少し！' : '💪 復習しよう！';

  const breakdown = document.getElementById('result-breakdown-list');
  breakdown.innerHTML = state.history.map((h, i) => {
    const q = state.questions[i];
    return `<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:0.85rem;">
      ${h.correct ? '⭕' : '❌'} ${q.q.substring(0, 40)}${q.q.length > 40 ? '…' : ''}
    </div>`;
  }).join('');

  document.getElementById('header-title').textContent = '結果';
  showScreen('result');
}

function retryQuiz() { startQuiz(state.currentSubject, state.currentUnit); }

// ===================== PROGRESS =====================
function renderProgress() {
  const history = getHistory();
  const total = history.length;
  const correct = history.filter(h => h.correct).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-acc').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '-';

  const detail = document.getElementById('progress-detail');
  let html = '';

  ['kokugo','sansu'].forEach(subj => {
    const subjName = subj === 'kokugo' ? '📖 国語' : '🔢 算数';
    const subjHistory = history.filter(h => h.subject === subj);
    if (subjHistory.length === 0) return;
    html += `<div class="card"><div class="card-title">${subjName}</div>`;
    Object.keys(QUESTIONS[subj]).forEach(unit => {
      const items = subjHistory.filter(h => h.unit === unit);
      if (items.length === 0) return;
      const acc = Math.round(items.filter(h => h.correct).length / items.length * 100);
      const cls = acc >= 80 ? 'acc-good' : acc >= 50 ? 'acc-mid' : 'acc-bad';
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;">
        <span style="font-size:0.9rem">${unit}</span>
        <span class="${cls}" style="font-weight:700;font-size:0.9rem">${acc}% (${items.length}問)</span>
      </div>`;
    });
    html += '</div>';
  });

  // Weak areas
  const weakAll = [];
  ['kokugo','sansu'].forEach(subj => {
    getWeakUnits(subj, history).forEach(unit => weakAll.push({ subj, unit }));
  });
  if (weakAll.length > 0) {
    html += `<div class="card"><div class="card-title" style="color:#ef4444">🔴 苦手単元</div>`;
    weakAll.forEach(({ subj, unit }) => {
      html += `<div class="weak-item" onclick="startQuiz('${subj}','${unit}')">
        <div>
          <div class="weak-item-name">${unit}</div>
          <div style="font-size:0.75rem;color:#6b7280">${subj === 'kokugo' ? '国語' : '算数'}</div>
        </div>
        <button class="review-btn" onclick="event.stopPropagation();startQuiz('${subj}','${unit}')">復習する</button>
      </div>`;
    });
    html += '</div>';
  }

  if (html === '') html = '<div class="no-data">まだデータがありません。学習を始めましょう！</div>';
  detail.innerHTML = html;
}

function renderWeakSummaryHome() {
  const history = getHistory();
  const weakAll = [];
  ['kokugo','sansu'].forEach(subj => {
    getWeakUnits(subj, history).forEach(unit => weakAll.push({ subj, unit }));
  });
  const el = document.getElementById('weak-summary-home');
  if (weakAll.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="card">
    <div class="card-title" style="color:#ef4444">🔴 苦手単元を復習しよう</div>
    ${weakAll.map(({ subj, unit }) => `
      <div class="weak-item" onclick="startQuiz('${subj}','${unit}')">
        <div class="weak-item-name">${unit} <span style="color:#6b7280;font-size:0.8rem">(${subj === 'kokugo' ? '国語' : '算数'})</span></div>
        <button class="review-btn">復習する</button>
      </div>`).join('')}
  </div>`;
}

// ===================== INIT =====================
goHome();
</script>
</body>
</html>
